<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diamond & UC Shop</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.container {
  padding: 20px;
}
.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
button {
  background: #22c55e;
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

  padding: 10px;

  margin: 5px;
}
</style>

<body>

<div class="container">
  <h1>💎 Diamond & UC Shop</h1>

  <div class="card">
    <h2>Mobile Legends Diamond</h2>
    <input type="text" placeholder="Enter Player ID"><br>
    <button>Buy 86 Diamond</button>
    <button>Buy 172 Diamond</button>
  </div>

  <div class="card">
    <h2>PUBG UC</h2>
    <input type="text" placeholder="Enter PUBG ID"><br>
    <button>Buy 60 UC</button>
    <button>Buy 325 UC</button>
  </div>

  <div class="card">
    <h3>Payment</h3>
    <p>KBZPay / WavePay</p>
    <p>Telegram: @YourShop</p>
  </div>
</div>

</html>

<script>
function order(item) {
  let id = prompt("Enter Player ID:");

  let message = "🛒 New Order\n"
              + "Item: " + item + "\n"
              + "Player ID: " + id;

  let token = "YOUR_BOT_TOKEN";
  let chat_id = "YOUR_CHAT_ID";

  let url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(message);

  fetch(url);

  alert("Order Sent!");
}

</script>
