<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoBoHtet Shop PRO</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; text-align:center; }

.topbar {
  background:#111; color:#fff; padding:10px;
}

h2 { color:#ff4da6; }

table {
  width:90%; margin:auto; border-collapse:collapse;
}

th, td {
  padding:10px; border:1px solid #ddd;
}

th { background:#ff4da6; color:white; }

button {
  background:#ff4da6; color:white;
  border:none; padding:8px 12px; cursor:pointer;
}

button:hover { background:#ff1a8c; }

/* Popup */
.popup-bg {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
}

.popup {
  background:white;
  margin:60px auto;
  padding:20px;
  width:90%; max-width:320px;
  border-radius:10px;
}
input, select {
  padding:8px; width:90%;
}
</style>
</head>

<body>

<!-- MONEY -->
<div class="topbar">
💰 Balance: <span id="balance">0</span> MMK
<button onclick="openMoney()">+ ထည့်မယ်</button>
</div>

<h2>💎 Diamond Shop 💎</h2>

<table>
<tr><th>Diamond</th><th>Price</th><th>Buy</th></tr>

<tr><td>11 💎</td><td>1050</td>
<td><button onclick="buyDiamond(1050,'11 💎')">ဝယ်မယ်</button></td></tr>

<tr><td>22 💎</td><td>2200</td>
<td><button onclick="buyDiamond(2200,'22 💎')">ဝယ်မယ်</button></td></tr>

<tr><td>44 💎</td><td>4100</td>
<td><button onclick="buyDiamond(4100,'44 💎')">ဝယ်မယ်</button></td></tr>

<tr><td>86 💎</td><td>5500</td>
<td><button onclick="buyDiamond(5500,'86 💎')">ဝယ်မယ်</button></td></tr>

</table>

<!-- ORDER FORM -->
<h2>📩 Order Form</h2>
<input type="text" id="uid" placeholder="User ID"><br><br>
<input type="text" id="server" placeholder="Server ID"><br><br>

<select id="package">
<option>11 💎</option>
<option>22 💎</option>
<option>44 💎</option>
<option>86 💎</option>
</select><br><br>

<button onclick="sendOrder()">Order Now</button>

<!-- MONEY POPUP -->
<div id="moneyBox" class="popup-bg">
  <div class="popup">
    <h3>💰 ငွေထည့်ရန်</h3>
    <input type="number" id="amount" placeholder="ငွေထည့်ပါ">
    <br><br>
    <button onclick="addMoney()">ထည့်မယ်</button>
    <br><br>
    <button onclick="closeMoney()">Cancel</button>
  </div>
</div>

<!-- PAYMENT POPUP -->
<div id="paymentBox" class="popup-bg">
  <div class="popup">
    <h3>💳 ငွေသွင်းရန်</h3>

    <p>KBZ Pay<br>BoBoHtet<br>09776937797</p>
    <button onclick="copyText('KBZ Pay - BoBoHtet - 09776937797')">Copy</button>

    <hr>

    <p>Wave Money<br>BoBoHtet<br>09776937797</p>
    <button onclick="copyText('Wave Money - BoBoHtet - 09776937797')">Copy</button>

    <hr>

    <p>AYA Pay<br>BoBoHtet<br>09776937797</p>
    <button onclick="copyText('AYA Pay - BoBoHtet - 09776937797')">Copy</button>

    <br><br>
    <button onclick="closePayment()">Close</button>
  </div>
</div>

<script>
let balance = 0;
let selectedPackage = "";

// LOAD
if(localStorage.getItem("money")){
  balance = parseInt(localStorage.getItem("money"));
  document.getElementById("balance").innerText = balance;
}

// MONEY
function openMoney(){
  document.getElementById("moneyBox").style.display="block";
}

function closeMoney(){
  document.getElementById("moneyBox").style.display="none";
}

function addMoney(){
  let amt = document.getElementById("amount").value;
  if(amt=="" || amt<=0){
    alert("ငွေထည့်ပါ!");
    return;
  }

  balance += parseInt(amt);
  document.getElementById("balance").innerText = balance;
  localStorage.setItem("money", balance);

  alert("ငွေထည့်ပြီးပါပြီ 💰");
  closeMoney();
}

// BUY
function buyDiamond(price, pack){
  selectedPackage = pack;

  if(balance >= price){
    balance -= price;
    document.getElementById("balance").innerText = balance;
    localStorage.setItem("money", balance);

    alert("ဝယ်ယူမှုအောင်မြင်ပါသည် 💎");
  } else {
    alert("ငွေမလုံလောက်ပါ ❌");
    openPayment();
  }
}

// TELEGRAM ORDER
function sendOrder(){
  let uid = document.getElementById("uid").value;
  let server = document.getElementById("server").value;
  let pack = document.getElementById("package").value;

  if(uid=="" || server==""){
    alert("အချက်အလက်ဖြည့်ပါ!");
    return;
  }

  let text = "New Order%0AUser ID: "+uid+
             "%0AServer: "+server+
             "%0APackage: "+pack;

  let token = "@MLBBdianomdbot";
  let chat_id = "8332477339:AAHTsR0UO54rgRZBALpi0T-6Hvt4755rtbE";

  let url = "https://api.telegram.org/bot"+token+
            "/sendMessage?chat_id="+chat_id+
            "&text="+text;

  window.open(url);

  alert("Order ပို့ပြီးပါပြီ 📩");
}

// COPY
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copy လုပ်ပြီးပါပြီ။ ငွေသွင်းပါ 😊");
}

// PAYMENT
function openPayment(){
  document.getElementById("paymentBox").style.display="block";
}

function closePayment(){
  document.getElementById("paymentBox").style.display="none";
}
</script>

</body>
</html>
