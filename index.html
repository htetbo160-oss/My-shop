<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoBoHtet Game Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to right,#0f75ff,#00c6ff);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    color:white;
}

.logo{
    font-size:15px;
    font-weight:bold;
}

/* CARD */
.card{
    background:bluew Light ;
    border-radius:12px;
    padding:15px;
    margin:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* GAME GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.item{
    background:white;
    border-radius:10px;
    padding:10px;
    text-align:center;
}

.item img{
    width:100%;
    border-radius:10px;
}

/* BUTTON */
.btn{
    background:#ff2ca0;
    color:white;
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
    margin-top:5px;
}

/* MONEY BOX */
.money{
    background:#00c853;
    color:white;
    padding:10px;
    text-align:center;
    font-size:18px;
    border-radius:10px;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.popup-content{
    background:white;
    margin:50px auto;
    padding:20px;
    width:90%;
    border-radius:10px;
}

.copy{
    background:black;
    color:white;
    padding:5px 10px;
    border:none;
    border-radius:5px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">💎 BoBoHtet Shop</div>
    <button onclick="openPay()">💰 Payment</button>
</div>

<!-- MONEY -->
<div class="card money">
    Balance: <span id="money">0</span> MMK
</div>

<!-- ADD MONEY -->
<div class="card">
    <input type="number" id="addMoney" placeholder="ထည့်မည့်ငွေ">
    <button class="btn" onclick="add()">Add Money</button>
</div>

<!-- GAME LIST -->
<div class="card">
    <h3>🎮 Mobile Legends Diamonds</h3>

    <div class="grid">

        <div class="item">
            <img src="https://cdn.oneesports.gg/cdn-data/2023/03/MLBB_AllHeroes.jpg">
            <p>11 💎</p>
            <p>1000 MMK</p>
            <button class="btn" onclick="buy(1000)">Buy</button>
        </div>

        <div class="item">
            <img src="https://cdn.oneesports.gg/cdn-data/2023/03/MLBB_AllHeroes.jpg">
            <p>22 💎</p>
            <p>2000 MMK</p>
            <button class="btn" onclick="buy(2000)">Buy</button>
        </div>

        <div class="item">
            <img src="https://cdn.oneesports.gg/cdn-data/2023/03/MLBB_AllHeroes.jpg">
            <p>86 💎</p>
            <p>5500 MMK</p>
            <button class="btn" onclick="buy(5500)">Buy</button>
        </div>

        <div class="item">
            <img src="https://cdn.oneesports.gg/cdn-data/2023/03/MLBB_AllHeroes.jpg">
            <p>172 💎</p>
            <p>11000 MMK</p>
            <button class="btn" onclick="buy(11000)">Buy</button>
        </div>

    </div>
</div>

<!-- PAYMENT POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h3>💰 ငွေသွင်းခြင်း</h3>

        <p>KBZ - BoBoHtet (09776937797)
        <button class="copy" onclick="copy('09776937797')">Copy</button></p>

        <p>Wave - BoBoHtet (09776937797)
        <button class="copy" onclick="copy('09776937797')">Copy</button></p>

        <p>AYA - BoBoHtet (09776937797)
        <button class="copy" onclick="copy('09776937797')">Copy</button></p>

        <p style="color:red;">Copy ကိုနှိပ်ပြီး ငွေသွင်းပါ</p>

        <button class="btn" onclick="closePay()">Close</button>
    </div>
</div>

<script>
let money = 0;

function add(){
    let val = document.getElementById("addMoney").value;
    money += Number(val);
    document.getElementById("money").innerText = money;
}

function buy(price){
    if(money >= price){
        money -= price;
        document.getElementById("money").innerText = money;
        alert("ဝယ်ယူပြီးပါပြီ ✅");
    }else{
        alert("ငွေမလုံလောက်ပါ ❌");
    }
}

function openPay(){
    document.getElementById("popup").style.display="block";
}

function closePay(){
    document.getElementById("popup").style.display="none";
}

function copy(text){
    navigator.clipboard.writeText(text);
    alert("Copied ✅");
}
</script>
    <Thankful/</Thankful>

</body>
</html>
